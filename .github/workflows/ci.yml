name: CI/CD

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: aivus_test
          POSTGRES_USER: aivus
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://aivus:test_password@localhost:5432/aivus_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      HMAC_SECRET: ci-test-secret
      API_KEY: ci-test-key

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --group dev
      - run: uv run python manage.py makemigrations --check
      - run: uv run pytest

  build-and-push:
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./compose/production/django/Dockerfile
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  changes:
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
      static: ${{ steps.filter.outputs.static }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migrations:
              - '**/migrations/*.py'
            static:
              - '**/static/**'
              - 'pyproject.toml'
              - 'uv.lock'

  deploy:
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'
    needs: [build-and-push, changes]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          RUN_MIGRATE: ${{ needs.changes.outputs.migrations }}
          RUN_COLLECTSTATIC: ${{ needs.changes.outputs.static }}
          FORCE_ALL: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,RUN_MIGRATE,RUN_COLLECTSTATIC,FORCE_ALL
          script: |
            set -e
            COMPOSE="docker compose -f docker-compose.production.yml"
            t0=$(date +%s)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd ~/aivus

            echo "[deploy] pulling images..."
            $COMPOSE pull django celeryworker celerybeat flower

            if [ "$RUN_MIGRATE" = "true" ] || [ "$FORCE_ALL" = "true" ]; then
              echo "[deploy] migrations changed -> running migrate (one-shot, new image)"
              $COMPOSE run --rm --no-deps --label traefik.enable=false django python manage.py migrate --noinput
            else
              echo "[deploy] no migration changes -> skip migrate"
            fi

            if [ "$RUN_COLLECTSTATIC" = "true" ] || [ "$FORCE_ALL" = "true" ]; then
              echo "[deploy] static/deps changed -> running collectstatic (one-shot, new image)"
              $COMPOSE run --rm --no-deps --label traefik.enable=false django python manage.py collectstatic --noinput
            else
              echo "[deploy] no static changes -> skip collectstatic"
            fi

            echo "[deploy] rolling django (zero-downtime via docker rollout)..."
            # Refuse to roll if the live compose lacks the /healthz healthcheck:
            # docker rollout would silently fall back to a blind 10s sleep and
            # reintroduce the 502 window this whole change exists to kill.
            $COMPOSE config | grep -q '/healthz' || { echo "[deploy] FATAL: django healthcheck missing in live compose; apply Server prerequisites (see DEPLOYMENT.md) before deploying"; exit 1; }
            tr0=$(date +%s)
            docker rollout -t 180 --wait-after-healthy 10 -f docker-compose.production.yml django
            tr1=$(date +%s)
            echo "[deploy] django healthy, rollout took $((tr1 - tr0))s"

            echo "[deploy] recreating celery services..."
            $COMPOSE up -d --no-deps celeryworker celerybeat flower

            docker image prune -f
            t1=$(date +%s)
            echo "[deploy] DONE in $((t1 - t0))s (migrate=$RUN_MIGRATE static=$RUN_COLLECTSTATIC force=$FORCE_ALL)"
